<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-grp">
        <div class="inputs">
            <input type="number" placeholder="Enter ID" id="empId">
            <input type="text" placeholder="Enter Name" id="empName">
            <input type="text" placeholder="Enter Department" id="empDept">
            <input type="number" placeholder="Enter Salary" id="empSalary">
            
        </div>
        <div class="buttons">
            <button id="addBtn">Add Employee</button>
            <button id="displayBtn">Display All</button>
            <button id="deptCountBtn">Count by Dept</button>
            <button id="avgSalaryBtn">Avg Salary</button>
            <button id="salaryFilter">More than 5000</button>
        </div>
        </div>

        <div class="details">
            <p id="info"></p>
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Salary</th>
                </tr>
                

            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
