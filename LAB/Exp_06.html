<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6</title>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html {
    font-size: 16px;
}

body {
    font-family: "Jet brains Mono", monospace;
    background-color: #f0f0f0;
    color: #333;
    padding: 20px;
    transition: .5s ease-in-out;
}
h1 {
    text-align: center;
    margin-bottom: 20px;
}

.container {
    max-width: 800px;
    margin: 0 auto;
    background-color: #ffffff48;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.input {
    margin-bottom: 20px;
}

input {
    padding: 10px;
    border: 1px solid #ffffff;
    border-radius: 4px;
    width: 100%;
    font-size: 1.2rem;
    outline:  none;
    background-color: #ffffff9c;
}
input::placeholder {
    color: #000000;
}
.buttons {
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    background-color: rgba(255, 255, 255, 0.509);
    border: 1px solid #ffffff;
    color: #1c1c1c;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: 600;
}

p {
    margin-top: 20px;
    line-height: 1.6;
    padding: 16px;
    background-color: #ffffff7c;
    border-radius: 8px;
    font-size: 1rem;
}
</style>
<body>
    <div class="container">

   <h1 id="heading">Into to JavaScript</h1>
    <div class="input">
        <input type="text" id="newHeading" placeholder="enter a heading">
    </div>
    <div class="buttons">
        <button id="changeHeadingBtn">Change Heading</button>
        <button id="changeBgColorBtn">Change Background Color</button>
        <button id="incFontSizeBtn">A+</button>
        <button id="decFontSizeBtn">A-</button>
        <button id="resetHeadingBtn">Reset</button>
        <button id="toggleBtn">Toggle</button>
    </div>
    <p class="para">Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
    </div>


    <script>
        let h = document.getElementById("heading");
let input = document.getElementById("newHeading");
let para = document.querySelector("p");

function changeHeading() {
    if(input.value.trim() !== "") {
        h.textContent = input.value;
    } else {
        alert("Please enter a valid heading.");
    }
}   

function resetHeading() {
    h.textContent = "Into to JavaScript";
    input.value = "";
}

function incFontSize() {
    let style = window.getComputedStyle(document.documentElement, null).getPropertyValue('font-size');
    let fontSize = parseFloat(style);
    document.documentElement.style.fontSize = (fontSize + 2) + 'px';
}

function decFontSize() {
    let style = window.getComputedStyle(document.documentElement, null).getPropertyValue('font-size');
    let fontSize = parseFloat(style);
    document.documentElement.style.fontSize = (fontSize - 2) + 'px';
}

function changeBgColor() {
    document.body.style.backgroundColor = getRandomColor();
}

function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

function togglePara() {
    para.style.display = (para.style.display === "none") ? "block" : "none";
}

document.getElementById("changeHeadingBtn").addEventListener("click", changeHeading);
document.getElementById("incFontSizeBtn").addEventListener("click", incFontSize);
document.getElementById("decFontSizeBtn").addEventListener("click", decFontSize);
document.getElementById("toggleBtn").addEventListener("click", togglePara);
document.getElementById("resetHeadingBtn").addEventListener("click", resetHeading);
document.getElementById("changeBgColorBtn").addEventListener("click", changeBgColor);

changeBgColor();
    </script>
</body>
</html>
